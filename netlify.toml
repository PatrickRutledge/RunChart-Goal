[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

# Explicitly handle static files
[[redirects]]
  from = "/privacy.html"
  to = "/privacy.html"
  status = 200
  force = true

# SPA redirect for Vue.js app
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/privacy.html"
    [headers.values]
    Content-Type = "text/html"
    Cache-Control = "no-cache"
