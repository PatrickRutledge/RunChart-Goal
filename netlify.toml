[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
    [headers.values]
    Access-Control-Allow-Origin = "*"

# Handle privacy.html specifically
[[redirects]]
  from = "/privacy.html"
  to = "/privacy.html"
  status = 200

# Handle all other routes for the SPA
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "18"
